# Please take care to protect the security of your data and do not disclose it to others carelessly.
dingtalk:
  client_id: "YOUR_APP_KEY"
  client_secret: "YOUR_APP_SECRET"

# Only messages from this DingTalk user are processed (your own staffId).
authorized_user_id: "YOUR_STAFF_ID"

# Allowed project directories (the first one is the default project).
#
# The bridge always appends {Edit,Write,MultiEdit,NotebookEdit}(<path>/**)
# to Claude Code's settings.json permissions.allow list each
# turn (tracks /cd), so in-project edits don't escalate to the phone.
projects:
  - name: hello-world
    path: ~/Projects/hello-world

# Permissions. Each tool call walks these gates in order; first decision wins.
#
#   tool call by Claude Code
#       │
#       ▼
#   ┌─ (1) PreToolUse guards ─────────────────────────────────────────┐
#   │ One-sided: both only escalate to a phone ask, never hard-deny.  │
#   │ 1) Bash guard: always-on tripwires catch `rm -f`, `rm --force`, │
#   │ `dd of=/dev/*`, `mkfs`, raw block-device writes, fork bombs;    │
#   │ then bashlex splits into atoms and checks each against `deny`   │
#   │ below (so a buried `cd /tmp && bash -c "rm -rf /foo"` is        │
#   │ caught). A write into .git/.claude escalates (incl. cp/tee).    │
#   │ 2) Edit guard: escalates an edit resolving outside the project  │
#   │ root, or into the project's .git/.claude.                       │
#   │ Anything else falls through.                                    │
#   └─────────────────────────────────────────────────────────────────┘
#       │ no decision
#       ▼
#   ┌─ (2) Settings layer ────────────────────────────────────────────┐
#   │ Claude Code merges your deny list here with its settings.json   │
#   │ layers (user ~/.claude/, plus per-project .claude/). Deny here  │
#   │ is written at the highest user-controlled precedence, so it     │
#   │ overrides allow rules in lower layers. A deny resolved here is  │
#   │ a hard block — the call is refused without a phone ask.         │
#   └─────────────────────────────────────────────────────────────────┘
#       │ no match
#       ▼
#   (3) Phone prompt via DingTalk — reply `ok` / `no`.
#
# Footguns:
#  - The Bash command guard only escalates Bash; deny on a non-Bash tool is
#    enforced solely by gate (2). Everything not pre-decided lands on the
#    phone ask at gate (3).
#  - Allow rules in your lower settings layers (~/.claude/, project .claude/)
#    stay live: a matching call auto-runs at gate (2) with no phone ask. Only
#    `deny` here or a gate (1) escalation overrides them.
permissions:
  # Same syntax as Claude Code's settings.json permissions.deny. Empty is
  # fine — the built-in tripwires still catch the obvious catastrophic forms.
  deny:
    - "Bash(rm -rf:*)"
    - "Bash(rm -fr:*)"
    - "Bash(rm -f:*)"
    - "Bash(git push --force:*)"
    - "Bash(git push -f:*)"

# Timeout (seconds) for a permission request; denied automatically on timeout.
permission_timeout_seconds: 600

# Geo gate: omit the whole section to skip the check and the proxy.
geo:
  proxy_url: http://127.0.0.1:8118      # local proxy address, shared by http/https
  geo_service: http://ip-api.com/json   # returns the caller's exit IP geolocation
  timeout_seconds: 3                    # geo service request timeout, in seconds
  target_country: US                    # expected exit-IP countryCode
